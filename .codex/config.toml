# Generated by TeamCast for teamcast

[features]
multi_agent = true

[agents.orchestrator]
description = "Use for any feature request, bug fix, or refactoring in the TeamCast project that involves planning + implementation + review. Entry point for the team pipeline."
config_file = "agents/orchestrator.toml"

[agents.planner]
description = "Use when a task requires deep codebase analysis before implementation. Reads src/ files, identifies patterns, and produces a step-by-step plan. Never modifies files."
config_file = "agents/planner.toml"

[agents.developer]
description = "Use when a clear implementation plan is ready. Writes TypeScript code, runs vitest tests, and verifies CLI commands work. No internet access."
config_file = "agents/developer.toml"

[agents.reviewer]
description = "Use after implementation is complete. Reviews TypeScript types, ESM imports, test coverage, pure function integrity, and CLI output style. Read-only, provides recommendations only."
config_file = "agents/reviewer.toml"
