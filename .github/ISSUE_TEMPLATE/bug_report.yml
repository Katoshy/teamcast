name: Bug report
description: Report a reproducible problem in TeamCast
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include enough detail to reproduce it locally.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command
      description: Which command triggered the problem?
      placeholder: teamcast generate --dry-run
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps, input files, and flags if possible.
      placeholder: |
        1. Create a manifest with ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      placeholder: What happened instead? Include errors or output snippets.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: TeamCast version
      placeholder: 1.0.3
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 24.0.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, manifests, or anything else that helps.
