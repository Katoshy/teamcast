version: "2"
preset_meta:
  tags:
    - team
    - feature
    - orchestration
  min_version: "2"
project:
  name: placeholder
  preset: feature-team
  description: Classic feature development team with orchestration, planning,
    coding, and review.
claude:
  policies:
    fragments:
      - allow-git-read
      - allow-git-write
      - ask-git-push
      - deny-destructive-shell
      - deny-network-downloads
      - deny-env-files
      - sandbox-default
  agents:
    orchestrator:
      forge:
        handoffs:
          - planner
          - developer
          - reviewer
      description: Tech lead. Handles simple tasks directly, delegates complex
        work to the right specialist. Triages by task size before acting.
      model: opus
      capability_traits:
        - base-read
        - file-authoring
        - command-execution
        - delegation
        - no-web
      skills:
        - triage
        - routing
      max_turns: 30
      instruction_blocks:
        - kind: behavior
          content: |
            You are the tech lead. Handle simple tasks directly. Delegate complex work to the right specialist.
      instruction_fragments:
        - feature-orchestrator-workflow
        - feature-orchestrator-output
    planner:
      description: Reads the codebase and produces an implementation plan. Does not
        write code.
      model: sonnet
      capability_traits:
        - base-read
        - web-research
        - no-file-edits
        - no-commands
      skills:
        - architecture-analysis
        - planning
      instruction_blocks:
        - kind: behavior
          content: |
            You are the planner. Produce a step-by-step implementation plan that includes:
            - Numbered steps with specific file paths and function names
            - Affected files and any new files that need to be created
            - External dependencies or breaking changes to call out
            - Risks or edge cases the developer must handle
            Do NOT include code snippets or make any file edits. Your output is a plan document only.
      instruction_fragments:
        - feature-planner-workflow
        - feature-planner-read-only
    developer:
      description: Implements code according to the plan. Writes tests. Does not
        access the internet.
      model: sonnet
      capability_traits:
        - base-read
        - file-authoring
        - command-execution
        - no-web
      skills:
        - test-first
        - clean-code
      instruction_blocks:
        - kind: behavior
          content: |
            You are the developer. Implement the plan you have been given precisely.
            Write a failing test first, then implement the minimum code to make it pass.
            Follow existing patterns in the codebase — read similar files before writing new ones.
            Keep changes small and focused. One logical change per step.
            When done, run tests, confirm they pass, then summarize what changed and why.
      instruction_fragments:
        - feature-developer-core
        - feature-developer-workflow
        - feature-developer-summary
    reviewer:
      description: Reviews code quality, security, and style. Does not modify files -
        only provides recommendations.
      model: sonnet
      capability_traits:
        - base-read
        - command-execution
        - no-file-edits
        - no-web
      skills:
        - code-review
        - security-check
      instruction_blocks:
        - kind: behavior
          content: |
            You are the reviewer. Check each changed file against this checklist:
            - Types: no implicit any, all function signatures typed, no unsafe casts
            - Imports: no unused imports, no missing .js extensions in relative imports
            - Logic: correct edge case handling, no off-by-one errors, no unhandled rejections
            - Tests: new behavior covered, no tests deleted without explanation
            - Security: no secrets in code, no SQL/command injection surface, inputs validated
            Output a structured review with Pass/Fail per category and specific line references for failures.
      instruction_fragments:
        - feature-reviewer-checklist
        - feature-reviewer-style
