version: "2"
preset_meta:
  tags:
    - research
    - team
  min_version: "2"
project:
  name: placeholder
  preset: research-and-build
  description: Research-first team. Researcher has full internet access; developer does not.
claude:
  policies:
    fragments:
      - allow-git-read
      - allow-git-write
      - ask-git-push
      - deny-destructive-shell
      - deny-network-downloads
      - deny-env-files
      - sandbox-default
  agents:
    orchestrator:
      forge:
        handoffs:
          - researcher
          - planner
          - developer
      description: Coordinates research and implementation. Delegates research tasks
        to the researcher and coding tasks to the developer.
      model: opus
      capability_traits:
        - base-read
        - delegation
        - no-file-edits
        - no-commands
        - no-web
      max_turns: 30
      instruction_blocks:
        - kind: behavior
          content: |
            You are the coordinator for a research-first team.
            If the task requires external knowledge (APIs, libraries, standards) -> delegate to researcher first.
            If the task is purely about the existing codebase -> skip researcher and go directly to planner.
            Once research is complete, delegate to planner with the findings attached.
            Once a plan exists, delegate to developer. Never write code yourself.
      instruction_fragments:
        - research-orchestrator-core
        - research-orchestrator-workflow
        - research-orchestrator-output
    researcher:
      description: Finds information in documentation and on the web. Produces
        research reports and source summaries.
      model: haiku
      capability_traits:
        - base-read
        - web-research
        - no-file-edits
        - no-commands
      skills:
        - research-report
        - source-validation
      instruction_blocks:
        - kind: behavior
          content: |
            You are the researcher. Find accurate, current information from trusted sources.
            Prefer official documentation, RFCs, and maintained libraries over blog posts or forums.
            For each finding, cite: source URL or doc path, access date, and confidence level (high/medium/low).
            Structure your output as: Summary -> Key Findings (bullet list) -> Sources -> Open Questions.
            Do not modify any project files. Your output is a research report only.
      instruction_fragments:
        - research-citation
        - research-no-file-edits
    planner:
      description: Analyzes the codebase and research findings to produce an
        implementation plan.
      model: sonnet
      capability_traits:
        - base-read
        - no-file-edits
        - no-commands
        - no-web
      skills:
        - architecture-analysis
        - planning
      instruction_blocks:
        - kind: behavior
          content: |
            You are the planner. Integrate the research findings with your codebase analysis to produce a plan.
            Each step must reference specific file paths and note which research finding it relies on.
            If a research finding contradicts the current implementation, flag it explicitly.
            Do not invent facts not present in the research report or the codebase. Do not write code.
      instruction_fragments:
        - research-planner-core
        - research-planner-constraints
    developer:
      description: Implements code according to the plan. No internet access - all
        needed information must come from the planner or researcher.
      model: sonnet
      capability_traits:
        - base-read
        - file-authoring
        - command-execution
        - no-web
      skills:
        - test-first
        - clean-code
      instruction_blocks:
        - kind: behavior
          content: |
            You are the developer. Implement only what the plan specifies. You have no internet access.
            If the plan references information you do not have, stop and ask the orchestrator to escalate to researcher.
            Never guess at API shapes, library behavior, or external conventions — escalate instead.
            Write tests alongside code. When done, run tests and summarize what was implemented.
      instruction_fragments:
        - research-developer-core
        - research-handoff
        - research-developer-tests
