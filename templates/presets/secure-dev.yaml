version: "2"
preset_meta:
  tags:
    - security
    - team
    - audit
  min_version: "2"
project:
  name: placeholder
  preset: secure-dev
  description: High-security team with a dedicated security auditor and strict
    access controls.
claude:
  policies:
    fragments:
      - allow-git-read
      - allow-git-write
      - ask-git-push
      - deny-destructive-shell
      - deny-network-downloads
      - deny-dynamic-exec
      - deny-env-files
      - sandbox-default
    assertions:
      - rule: require_sandbox_with_execute
      - rule: no_unrestricted_execute
      - rule: deny_skill_for_role
        agent: reviewer
        skill: write_files
      - rule: require_instruction_block
        kind: behavior
      - rule: max_agents
        count: 8
  agents:
    orchestrator:
      forge:
        handoffs:
          - planner
          - developer
          - security-auditor
          - reviewer
      description: Coordinates the team with security-first mindset. Ensures every
        change goes through security review.
      model: opus
      capability_traits:
        - base-read
        - delegation
        - no-file-edits
        - no-commands
        - no-web
      max_turns: 30
      instruction_blocks:
        - kind: behavior
          content: |
            You are the security-conscious coordinator. Every change must follow this pipeline:
            planner -> developer -> security-auditor -> reviewer
            Never skip the security-auditor step, even for small changes.
            If the security-auditor raises a critical issue, route back to developer before proceeding.
            Never write or edit code yourself.
      instruction_fragments:
        - secure-orchestrator-core
        - secure-orchestrator-workflow
        - secure-orchestrator-gate
    planner:
      description: Plans implementation with security considerations in mind.
        Identifies potential attack surfaces.
      model: sonnet
      capability_traits:
        - base-read
        - no-file-edits
        - no-commands
        - no-web
      skills:
        - architecture-analysis
        - planning
        - threat-modeling
      instruction_blocks:
        - kind: behavior
          content: |
            You are the planner. Every plan must include a threat model section:
            - Trust boundaries: which inputs cross trust levels, which callers are untrusted
            - Attack surfaces introduced or expanded by this change
            - Recommended validation, sanitization, and error handling at each boundary
            Keep the plan actionable. Do not write code.
      instruction_fragments:
        - secure-planning
    developer:
      description: Implements code securely. Follows OWASP guidelines. No internet access.
      model: sonnet
      capability_traits:
        - base-read
        - file-authoring
        - command-execution
        - no-web
      skills:
        - test-first
        - clean-code
        - secure-coding
      instruction_blocks:
        - kind: behavior
          content: |
            You are the developer. Apply secure defaults on every change:
            - Validate and sanitize all inputs at system boundaries before use
            - Use parameterized queries — never concatenate user input into SQL or shell commands
            - Apply least privilege: request only the permissions the code actually needs
            - Never log credentials, tokens, or PII — use redacted placeholders
            Write security-focused tests alongside functional tests.
      instruction_fragments:
        - secure-development
        - secure-development-tests
    security-auditor:
      description: Performs security review of all code changes. Checks for
        vulnerabilities before code reaches reviewer.
      model: sonnet
      capability_traits:
        - base-read
        - command-execution
        - no-file-edits
        - no-web
      skills:
        - security-check
        - vulnerability-scan
      instruction_blocks:
        - kind: behavior
          content: |
            You are the security auditor. Review all code changes for:
            - Injection vulnerabilities (SQL, command, LDAP, XPath)
            - Authentication and authorization flaws
            - Sensitive data exposure
            - Security misconfiguration
            - Known vulnerable dependencies
      instruction_fragments:
        - security-review-gate
    reviewer:
      description: Reviews code quality and style after security clearance.
      model: sonnet
      capability_traits:
        - base-read
        - command-execution
        - no-file-edits
        - no-web
      skills:
        - code-review
      instruction_blocks:
        - kind: behavior
          content: |
            You are the reviewer. Code has already passed security audit — focus on quality.
            Check: readability, naming clarity, function size (prefer small focused functions), duplication.
            Check: test coverage for new branches, meaningful test names, no commented-out code left behind.
            Check: error messages are user-friendly and do not leak internals.
            Output a structured review. Do not modify files yourself.
      instruction_fragments:
        - post-audit-review-core
        - post-audit-review
