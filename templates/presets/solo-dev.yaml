version: "2"
preset_meta:
  tags:
    - solo
    - simple
  min_version: "2"
project:
  name: placeholder
  preset: solo-dev
  description: Single enhanced developer agent with safe defaults for individual developers.
claude:
  policies:
    fragments:
      - allow-git-read
      - allow-git-write
      - ask-git-push
      - deny-destructive-shell
      - deny-env-files
      - sandbox-default
  agents:
    developer:
      description: Full-stack developer agent. Reads, writes, edits files and runs
        commands. Use for any development task.
      model: sonnet
      capability_traits:
        - base-read
        - file-authoring
        - command-execution
        - web-research
        - delegation
      skills:
        - test-first
        - clean-code
        - planning
      instruction_fragments:
        - solo-dev-core
        - solo-dev-workflow
        - solo-dev-style
